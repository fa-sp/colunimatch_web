<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shadow -->
  <ellipse cx="32" cy="60" rx="18" ry="3" fill="#00000015"/>

  <!-- Colombian Flag as a cute rounded badge -->
  <clipPath id="fc">
    <rect x="12" y="18" width="40" height="40" rx="10" ry="10"/>
  </clipPath>
  <g clip-path="url(#fc)">
    <rect x="12" y="18" width="40" height="20" fill="#FCD116"/>
    <rect x="12" y="38" width="40" height="10" fill="#003893"/>
    <rect x="12" y="48" width="40" height="12" fill="#CE1126"/>
  </g>
  <rect x="12" y="18" width="40" height="40" rx="10" ry="10" fill="none" stroke="#00000018" stroke-width="1"/>

  <!-- Cute face on yellow section -->
  <circle cx="24" cy="31" r="2.5" fill="#5D4037"/>
  <circle cx="40" cy="31" r="2.5" fill="#5D4037"/>
  <circle cx="25" cy="30" r="0.8" fill="#FFF"/>
  <circle cx="41" cy="30" r="0.8" fill="#FFF"/>
  <!-- Blushing cheeks -->
  <ellipse cx="20" cy="35" rx="3" ry="2" fill="#FF8A8030"/>
  <ellipse cx="44" cy="35" rx="3" ry="2" fill="#FF8A8030"/>
  <!-- Cute smile -->
  <path d="M27 35 Q32 40 37 35" fill="none" stroke="#5D4037" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Graduation Cap - tilted for cuteness -->
  <g transform="rotate(-8, 32, 14)">
    <polygon points="32,4 8,16 32,22 56,16" fill="#2D2D2D"/>
    <polygon points="32,4 8,16 32,10 56,16" fill="#444"/>
    <circle cx="32" cy="8" r="2.2" fill="#F2A900"/>
  </g>

  <!-- Tassel -->
  <path d="M50 14 Q54 22 52 30" fill="none" stroke="#F2A900" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="52" cy="31" r="2.5" fill="#F2A900"/>
  <path d="M50.5 31 L53.5 31 L52 35 Z" fill="#F2A900"/>

  <!-- Sparkles -->
  <g fill="#F2A900">
    <polygon points="6,8 7,5 8,8 11,9 8,10 7,13 6,10 3,9" transform="scale(0.6) translate(4,4)"/>
    <polygon points="6,8 7,5 8,8 11,9 8,10 7,13 6,10 3,9" transform="scale(0.5) translate(108,6)"/>
    <polygon points="6,8 7,5 8,8 11,9 8,10 7,13 6,10 3,9" transform="scale(0.4) translate(12,60)"/>
  </g>
</svg>
